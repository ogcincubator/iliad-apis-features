# Default configuration for the bblock-relevance skill.
#
# Resolution order (first match wins):
#   1. <workspace>/.claude/bblock-relevance.yaml
#   2. ~/.claude/bblock-relevance.yaml
#   3. this file (skill defaults)
#
# Backend configuration (Chroma, Qdrant, Pinecone, OpenAI parquet cache,
# precomputed parquet) is owned by the embedding-store skill and lives in
# .claude/embedding-store.yaml. This file references a backend by name only.

weights:
  type_match:            0.20
  properties_match:      0.20
  model_match:           0.20
  vocabulary_match:      0.15
  themes_keywords_match: 0.10
  embeddings_similarity: 0.15

embeddings:
  backend: local-chroma             # resolved by the embedding-store skill;
                                    # omit to use embedding-store's own default.

cache:
  dir: ./build-local/.relevance
  ttl_hours: 24

grouping:
  axes: [itemClass, intent]
  intent_rules:
    data:     [vector, gridded, model, vocabulary]
    metadata: [metadata]
    ontology: [ontology]
