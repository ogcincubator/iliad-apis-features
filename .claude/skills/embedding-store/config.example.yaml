# Default configuration for the embedding-store skill.
#
# Resolution order (first match wins):
#   1. <workspace>/.claude/embedding-store.yaml
#   2. ~/.claude/embedding-store.yaml
#   3. this file (skill defaults)
#
# Each backend declares how to reach it and which model to use when the caller
# supplies text instead of a vector. The `default` field names the backend
# used when callers omit the `backend` argument.

default: local-chroma

backends:

  local-chroma:
    type: chromadb
    path: ./build-local/.embeddings/chroma
    collection: bblocks
    embed_with: sentence-transformers/all-MiniLM-L6-v2

  qdrant:
    type: qdrant
    url: http://localhost:6333
    api_key_env: QDRANT_API_KEY        # optional
    collection: bblocks
    embed_with: openai:text-embedding-3-small

  pinecone:
    type: pinecone
    api_key_env: PINECONE_API_KEY
    index: bblocks
    namespace: production              # optional
    embed_with: openai:text-embedding-3-small

  openai:
    type: openai
    api_key_env: OPENAI_API_KEY
    model: text-embedding-3-small
    cache: ./build-local/.embeddings/openai.parquet

  precomputed:
    type: precomputed
    path: ./build-local/.embeddings/bblocks.parquet
