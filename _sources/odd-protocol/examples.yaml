- title: ODD Protocol second update — Grimm et al. 2020 (JASSS)
  description: >
    OGC Records representation of the canonical ODD Protocol paper published in
    the Journal of Artificial Societies and Social Simulation, 23(2)7, 2020.
    Demonstrates the bibliographic scaffold (GeoDCAT-Records) combined with the
    seven-element `odd` extension covering the paper's meta-level ODD template.
  snippets:
    - language: json
      ref: examples/jasss_odd_protocol_2020.json

- title: OSMOSE — marine multispecies IBM (ODD)
  description: >
    OGC Records representation of the OSMOSE (Object-oriented Simulator of
    Marine Ecosystems) model described using the ODD Protocol. OSMOSE is a
    spatially-explicit multispecies individual-based model for marine fish
    communities using size-based predation and super-individual (school)
    aggregation. Demonstrates full vocabulary annotation with NERC P01, CF
    standard names, Darwin Core, and WoRMS/OBIS AphiaID mappings on entity
    state variables, input data, and submodel equations (Von Bertalanffy,
    Gompertz, predation size-ratio, starvation, reproduction, spatial
    distribution).
  snippets:
    - language: json
      ref: examples/osmose_odd.json
