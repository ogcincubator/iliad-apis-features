$schema: https://json-schema.org/draft/2020-12/schema
title: ODD Protocol Description Record
description: >
  OGC API Records profile for simulation model publications described using the
  ODD Protocol (Grimm et al. 2020). Extends GeoDCAT-Records with a structured
  `odd` sub-object covering the three ODD sections: Overview (purpose, patterns,
  entities, process overview), Design Concepts (11 concepts), and Details
  (initialization, input data, submodels). Vocabulary terms for entities and
  variables are intentionally open-ended to allow domain-specific narrowing.

allOf:
  - $ref: bblocks://ogc.geo.geodcat.geodcat-records

properties:
  properties:
    type: object
    properties:

      # ── ODD top-level extension ───────────────────────────────────────────
      odd:
        type: object
        description: >
          ODD Protocol structured description. Keys map directly to the seven
          ODD elements. Each text field accepts plain prose; structured sub-fields
          provide vocabulary anchor points for domain profiles.
        properties:

          # ── OVERVIEW ─────────────────────────────────────────────────────

          purpose:
            type: string
            description: >
              Why was the model developed? What question(s) does it address?
              Include any patterns the model is intended to reproduce
              (Pattern-Oriented Modeling).

          patterns:
            type: array
            description: >
              Empirical or stylised patterns used to design, parameterise, or
              validate the model. Each entry links to an observation or dataset
              (domain vocabulary slot).
            items:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                reference:
                  type: string
                  format: uri
                  description: DOI, URL, or vocabulary term URI for the pattern source

          entities:
            type: array
            description: >
              Agent types, environmental entities, and other model components.
              `stateVariables[].vocabularyTerm` is the slot for domain vocabulary
              injection (NERC, CF, Darwin Core, ICES, …).
            items:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                entityType:
                  type: string
                  description: >
                    Role of the entity: agent | patch | grid-cell | network-node |
                    network-link | environment | resource | observer | other
                stateVariables:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                        description: Data type (boolean, integer, real, string, list, …)
                      unit:
                        type: string
                        description: >
                          Physical unit string (e.g. "m s-1"). For QUDT or NERC
                          unit alignment, use vocabularyTerm.
                      range:
                        type: string
                        description: Valid range or enumeration (e.g. "[0, 1]", "non-negative")
                      description:
                        type: string
                      vocabularyTerm:
                        type: string
                        format: uri
                        description: >
                          Authoritative URI for the variable concept. Priority:
                          NERC > CF > Darwin Core > OBIS > ICES > OGC > schema.org
                scales:
                  type: object
                  properties:
                    spatial:
                      type: string
                      description: Spatial resolution and extent (e.g. "1 m grid, 10 km × 10 km")
                    temporal:
                      type: string
                      description: Time step and total duration (e.g. "1 day, 30 years")

          processOverview:
            type: object
            description: >
              Which processes are executed, by whom, and in what order?
              The scheduling field must describe the temporal ordering precisely
              (e.g. "synchronous, random order within step").
            properties:
              scheduling:
                type: string
              processes:
                type: array
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    executedBy:
                      type: string
                      description: Entity type that runs this process
                    description:
                      type: string

          # ── DESIGN CONCEPTS ───────────────────────────────────────────────

          designConcepts:
            type: object
            description: >
              The 11 design concepts defined by ODD. Each is a free-text field;
              domain profiles may add controlled-vocabulary annotations alongside.
            properties:
              basicPrinciples:
                type: string
                description: >
                  Which general theoretical or empirical concepts (theories,
                  hypotheses, heuristics) underlie the model?
              emergence:
                type: string
                description: >
                  Which key model results emerge from agent interactions rather
                  than being imposed directly on the agents?
              adaptation:
                type: string
                description: >
                  What adaptive traits do agents have, and on what information
                  are adaptation decisions based?
              objectives:
                type: string
                description: >
                  What objectives do agents seek to achieve, and how are the
                  objectives measured?
              learning:
                type: string
                description: >
                  Do agents adapt their behaviour over time in response to
                  experience? What algorithm is used?
              prediction:
                type: string
                description: >
                  Do agents make predictions about future conditions? What
                  methods or models are used for prediction?
              sensing:
                type: string
                description: >
                  What information can agents perceive about themselves and
                  the environment? Are sensing assumptions justified?
              interaction:
                type: string
                description: >
                  What direct and indirect interactions occur among agents
                  and between agents and the environment?
              stochasticity:
                type: string
                description: >
                  Which processes are represented as stochastic? How and why?
              collectives:
                type: string
                description: >
                  Are there collectives (groups, flocks, organisations, markets)?
                  How are they represented and how do they affect agent behaviour?
              observation:
                type: string
                description: >
                  What data are collected from the model for analysis?
                  How are collectives, individuals, and the environment observed?

          # ── DETAILS ───────────────────────────────────────────────────────

          initialization:
            type: object
            description: >
              State of the model at t=0: number of agents, their initial attributes,
              spatial configuration, and how the initial state was chosen.
            properties:
              description:
                type: string
              seed:
                type: string
                description: How the random seed is specified or varied across runs
              links:
                type: array
                description: >
                  References to initialization data files or datasets
                  (domain vocabulary slot for DCAT Dataset links).
                items:
                  type: object
                  required: [href]
                  properties:
                    href:
                      type: string
                      format: uri
                    title:
                      type: string
                    type:
                      type: string
                      description: Media type

          inputData:
            type: array
            description: >
              External data sources (time series, maps, tables) used to drive or
              parameterise the model. `vocabularyTerm` is the domain slot for
              NERC, CF, or dataset-catalogue URIs.
            items:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                source:
                  type: string
                  format: uri
                  description: Access URL (DCAT Distribution, OGC API, or DOI)
                format:
                  type: string
                  description: Media type or format name (e.g. "text/csv", "NetCDF")
                temporalCoverage:
                  type: string
                vocabularyTerm:
                  type: string
                  format: uri
                  description: >
                    Concept URI for the variable or dataset type. Priority:
                    NERC > CF > Darwin Core > OBIS > ICES > EMODnet

          submodels:
            type: array
            description: >
              Detailed descriptions of each submodel. Equations and
              parameterisation choices that are not derivable from first principles
              must be fully documented here.
            items:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                equations:
                  type: string
                  description: Mathematical specification (LaTeX or plain text)
                parameterization:
                  type: string
                  description: Parameter values, sources, and calibration approach
                links:
                  type: array
                  description: References to code, data, or supplementary material
                  items:
                    type: object
                    required: [href]
                    properties:
                      href:
                        type: string
                        format: uri
                      rel:
                        type: string
                      title:
                        type: string
