tests:
  - name: GFW fishing events schema validation
    description: Validate the example JSON against the schema.
    input: ../examples/sample.json
    schema: ../schema.yaml
    expected: valid
  - name: Description references source API
    description: Confirm the description mentions Global Fishing Watch and the Events API.
    input: ../description.md
    contains:
      - "Global Fishing Watch"
      - "https://gateway.api.globalfishingwatch.org/v3/events?limit=50&offset=0&sort=-start"
      - "public-global-fishing-events:latest"
      - "50"
  - name: Examples record retriever provenance
    description: Confirm examples.yaml records the exact source URL and request body for the retriever-sourced example.
    input: ../examples.yaml
    contains:
      - "global-fishing-watch-data-service"
      - "https://gateway.api.globalfishingwatch.org/v3/events?limit=50&offset=0&sort=-start"
      - "public-global-fishing-events:latest"
      - "2026-04-14"
      - "2026-04-19"
